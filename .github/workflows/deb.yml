name: Inspect IMG Patch Tools

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest

    steps:
      - name: Download IMG Patch Tools
        run: |
          wget -q \
            https://github.com/erfanoabdi/imgpatchtools/releases/download/0.3/IMG_Patch_Tools_0.3.zip \
            -O imgpatchtools.zip

          echo "===== ZIP INFO ====="
          ls -lh imgpatchtools.zip

          unzip -q imgpatchtools.zip

          echo ""
          echo "===== DIRECTORY TREE ====="
          find . | sort

          echo ""
          echo "===== EXECUTABLE FILES ====="
          find . -type f -executable | sort || true

          echo ""
          echo "===== FILE TYPES ====="
          find . -type f | while read f; do
            file "$f"
          done
