name: Download, Extract IMG Contents and Upload

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Zwolnienie miejsca na dysku ─────────────────────────────────────
      - name: Free disk space
        run: |
          echo "Before:"
          df -h /
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          docker rmi $(docker images -q) 2>/dev/null || true
          echo "After:"
          df -h /

      # ── Instalacja zależności ────────────────────────────────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y unzip zip lz4 android-sdk-libsparse-utils
          pip install -q gdown

      # ── Pobranie ZIP z Google Drive ─────────────────────────────────────
      - name: Download ZIP from Google Drive
        run: |
          mkdir -p gdrive_download
          gdown --id 1cnDhDac0iu4FJlNRrhAu0obbYdW6yNhC -O gdrive_download/rom_images.zip
          echo "=== Pobrany plik ==="
          ls -lh gdrive_download/

      # ── Rozpakowanie zewnętrznego ZIP ───────────────────────────────────
      - name: Extract outer ZIP
        run: |
          mkdir -p extracted
          unzip -q gdrive_download/rom_images.zip -d extracted
          rm gdrive_download/rom_images.zip
          echo "=== Zawartość po rozpakowaniu ZIP ==="
          ls -lh extracted/

      # ── Dekompresja lz4 (jeśli obrazy są skompresowane) ─────────────────
      - name: Decompress lz4 images (if any)
        run: |
          cd extracted
          for f in *.lz4; do
            [ -f "$f" ] || continue
            echo "Dekompresuję: $f"
            lz4 -d "$f" "${f%.lz4}"
            rm "$f"
          done
          ls -lh

      # ── Konwersja sparse -> raw (jeśli potrzebna) ───────────────────────
      - name: Convert sparse images to raw (if needed)
        run: |
          cd extracted
          for f in *.img; do
            [ -f "$f" ] || continue
            if file "$f" | grep -q "Android sparse image"; then
              echo "Konwertuję sparse -> raw: $f"
              simg2img "$f" "${f%.img}_raw.img"
              rm "$f"
              mv "${f%.img}_raw.img" "$f"
            fi
          done
          ls -lh

      # ── Wypakowywanie zawartości każdego .img ────────────────────────────
      - name: Extract contents from each .img
        run: |
          mkdir -p img_contents
          sudo mkdir -p /mnt/img_mount

          for img in extracted/*.img; do
            [ -f "$img" ] || continue
            name=$(basename "$img" .img)
            echo "=============================="
            echo "Montuję i wypakowuję: $img -> img_contents/$name/"
            echo "=============================="

            mkdir -p "img_contents/$name"

            sudo mount -o loop,ro "$img" /mnt/img_mount 2>/dev/null \
              || sudo mount -o loop,ro,errors=continue "$img" /mnt/img_mount

            sudo cp -a /mnt/img_mount/. "img_contents/$name/"
            sudo umount /mnt/img_mount

            echo "=== Zawartość $name ==="
            ls -lh "img_contents/$name/" | head -20
          done

          echo "=== Wolne miejsce po ekstrakcji ==="
          df -h /

      # ── Usuwanie ciężkich artefaktów przed pakowaniem ───────────────────
      - name: Cleanup before packing
        run: |
          rm -rf extracted
          df -h /

      # ── Pakowanie zawartości do ZIP ──────────────────────────────────────
      - name: Pack extracted contents into ZIP
        run: |
          mkdir -p final_output
          echo "=== Pakowanie img_contents/ do ZIP ==="

          cd img_contents
          zip -0 -r ../final_output/ROM_Contents.zip .
          cd ..

          echo "=== Wynikowy ZIP ==="
          ls -lh final_output/
          df -h /

      # ── Upload do GitHub Artifacts ───────────────────────────────────────
      - name: Upload ZIP to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ROM_Contents_ZIP
          path: final_output/ROM_Contents.zip
          retention-days: 5
