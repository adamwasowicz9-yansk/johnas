name: Inspect OTA

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest

    steps:
      - name: Download OTA artifact
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          set -eux

          ARTIFACT_ID=7709183127

          curl -L \
            -H "Authorization: Bearer ${GH_PAT}" \
            -H "Accept: application/vnd.github+json" \
            -o ota.zip \
            "https://api.github.com/repos/adamwasowicz9-yansk/johnas/actions/artifacts/${ARTIFACT_ID}/zip"

          file ota.zip
          ls -lh ota.zip

      - name: Extract OTA artifact
        run: |
          set -eux

          mkdir ota_artifact
          unzip ota.zip -d ota_artifact

          echo "=== artifact content ==="
          find ota_artifact -type f

      - name: Inspect OTA package
        run: |
          set -eux

          OTA=$(find ota_artifact -iname "*.zip" | head -n1)

          echo "OTA FILE:"
          echo "$OTA"

          unzip -l "$OTA" | tee ota_filelist.txt

          echo
          echo "=== metadata ==="
          unzip -p "$OTA" META-INF/com/android/metadata \
            | tee metadata.txt || true

          echo
          echo "=== updater-script first 500 lines ==="
          unzip -p "$OTA" META-INF/com/google/android/updater-script \
            | head -500 \
            | tee updater_script.txt || true

          echo
          echo "=== patch files ==="
          unzip -l "$OTA" | egrep '\.p$|\.patch\.dat$' \
            | tee patches.txt || true

          echo
          echo "=== transfer lists ==="
          unzip -l "$OTA" | grep transfer.list \
            | tee transfer_lists.txt || true

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: ota-inspection
          path: |
            ota_filelist.txt
            metadata.txt
            updater_script.txt
            patches.txt
            transfer_lists.txt
