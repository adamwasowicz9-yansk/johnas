name: Inspect OTA

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest

    steps:
      - name: Download OTA artifact
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          set -eux

          ARTIFACT_ID=7709183127

          curl -L \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            -o ota.zip \
            "https://api.github.com/repos/adamwasowicz9-yansk/johnas/actions/artifacts/${ARTIFACT_ID}/zip"

          file ota.zip
          ls -lh ota.zip

      - name: Extract artifact
        run: |
          mkdir artifact
          unzip ota.zip -d artifact

          echo "=== ARTIFACT CONTENT ==="
          find artifact -type f | sort

      - name: Find OTA ZIP
        run: |
          echo "=== ZIP FILES ==="
          find artifact -iname "*.zip"

      - name: Inspect OTA
        run: |
          OTA=$(find artifact -iname "*.zip" | head -n1)

          echo "OTA=$OTA"

          echo "=== ZIP LIST ==="
          unzip -l "$OTA" | tee ota_contents.txt

          echo
          echo "=== PATCH FILES ==="
          unzip -l "$OTA" | grep '\.p$' || true

          echo
          echo "=== TRANSFER LISTS ==="
          unzip -l "$OTA" | grep 'transfer.list' || true

          echo
          echo "=== NEW.DAT FILES ==="
          unzip -l "$OTA" | grep '\.new\.dat' || true

          echo
          echo "=== PATCH.DAT FILES ==="
          unzip -l "$OTA" | grep '\.patch\.dat' || true

      - name: Extract updater-script
        run: |
          OTA=$(find artifact -iname "*.zip" | head -n1)

          unzip -p "$OTA" META-INF/com/google/android/updater-script \
            > updater-script.txt || true

          echo "=== FIRST 300 LINES ==="
          head -300 updater-script.txt || true

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: ota-inspection
          path: |
            ota_contents.txt
            updater-script.txt
